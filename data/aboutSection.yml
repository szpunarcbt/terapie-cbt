topTitle: Kilka słów wstępu
title: >
  ## O mnie
content: >
  Ukończyłam 4 letnie szkolenie w Szkole Psychoterapii Crescentia w nurcie poznawczo -
  behawioralnym. Szkoła posiada akredytację Polskiego Towarzystwa Terapii Poznawczo -
  Behawioralnej. Sama jestem członkinią Polskiego Towarzystwa Terapii Poznawczo-Behawioralnej.
  Swoją pracę terapeutyczną regularnie superwizuję u superwizora z ramienia PTTPB.
contentMore: >
  Doskonalę swój warsztat terapeutyczny, poszerzając go zarówno o narzędzia i techniki pracy w głównym nurcie, jak i korzystając z trzeciej fali oraz terapii schematów.
  Ukończyłam roczne szkolenie Spotkanie w terapią schematów, prowadzone przez Olgę Olszewską.
  <br><br>
  Jestem doktorem nauk humanistycznych w zakresie pedagogiki społecznej. Doktorat obroniłam w 2005 na Uniwersytecie Kazimierza Wielkiego w Bydgoszczy, zajmując się w swoich badaniach uwarunkowaniami funkcjonowania w roli pracowników socjalnych. Posiadam certyfikat szkolenia z szkolenia z coachingu, prowadzonego przez dr Joannę Rajang oraz I stopnia Terapii Skoncentrowanej na Rozwiązaniach, prowadzonego przez Tomasza Świtka.
  <br><br>
  Od ponad 20 lat pracuje ze studentami w zakresie pracy socjalnej (UG), prowadząc zarówno zajęcia teoretyczne, ale też i praktyczne z nowoczesnych metod pracy z człowiekiem w kryzysie, w pracy nad zmianą i wydobywaniem potencjału. W trakcie szkoleń wykorzystuje swoją wiedzę i umiejętności z coachingu i terapii skoncentrowanej na rozwiązaniach, które podobnie jak terapia poznawczo-behawioralna, skupia się na celach klienta, na wykorzystaniu jego zasobów w kierunku pożądanej przez niego zmiany. 


