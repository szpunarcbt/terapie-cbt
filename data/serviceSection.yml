topTitle: Oferta
      
title: > 
      ## Jak pomagam?
      
      W swojej pracy wykorzystuję różne techniki terapeutyczne, które pozwalają na skuteczne wsparcie w rozwiązywaniu problemów i osiąganiu celów. **Cena za 50 minutową sesję wynosi 180zł.**
service:
  - content: >
      **Terapia indywidualna**
      W nurcie poznawczo-behawioralnym dla pacjentów, którzy potrzebują pomocy w obszarze:
    contentMore: >
      - Zaburzenia lękowe, które znacząco utrudniają funkcjonowanie pacjenta, wzbudzając w nim różnorodne lęki, które są wręcz paraliżujące, wywołują cierpienie oraz ograniczają możliwość funkcjonowania społecznego (fobia społeczna, zaburzenia obsesyjno-kompulsywne, lęk uogólniony).  

      - Zaburzenia nastroju, które związane są z niewłaściwym postrzeganiem siebie i swoich możliwości, smutkiem, cierpieniem egzystencjalnym, niemocą (depresja).  

      - Kryzysy, gdy jakieś wydarzenie w życiu człowieka jest na tyle trudne, że powoduje destabilizację, zachwianie równowagi psychicznej, niemoc, niechęć do działania, a kryzys powoduje, że dotychczasowe strategie radzenia sobie w sytuacjach trudnych przestają działać (kryzys w związku, kryzys wieku średniego, rozwód/rozstanie, strata, samotność, trudności w znalezieniu partnera/ki).
    image: images/service/health1.svg
  - content: >
      **Live-Coaching**
      Definiowanie celów indywidualnych, rozwojowych w różnorodnych obszarach życia (mieszkania, rozwoju zawodowego, osobistego, realizacji marzeń).
    image: images/service/life-coach.svg
  - content: >
      **Gdzie przyjmuję?**
      Oferuję konsultacje w gabinecie (Gdańsk-Wrzeszcz) oraz on-line.
    image: images/service/buisness.svg
  



